<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUESTIONS LANDMINE!</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --danger: #FF4444;
            --success: #4CAF50;
            --dark: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Balsamiq Sans', cursive; overflow: hidden; background-color: #222;
        }

        .page { display: none; width: 100%; height: 100%; position: absolute; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* --- PAGES --- */
        #home-page { background-image: url('home_page.png'); justify-content: center; gap: 15px; }
        #game-page { background-image: url('game_page.png'); padding-top: 15px; }

        .btn-ui {
            padding: 15px 30px; font-size: 1.5rem; font-family: 'Balsamiq Sans', cursive; font-weight: 700;
            background: white; border: 5px solid var(--dark); border-radius: 20px; cursor: pointer;
            box-shadow: 0 8px 0 var(--dark); transition: transform 0.1s; min-width: 250px;
        }
        .btn-ui:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--dark); }
        .btn-start { background: var(--primary); }

        /* --- SCOREBOARD --- */
        .game-header { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .scoreboard { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .team-box {
            background: rgba(255, 255, 255, 0.95); padding: 5px; border: 3px solid var(--dark);
            border-radius: 12px; text-align: center; min-width: 110px; transition: 0.3s;
        }
        .team-box.active-turn { border-color: #e67e22; transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }
        .score-val { font-size: 1.4rem; font-weight: bold; display: block; margin: 2px 0; }
        
        .manual-btns { display: flex; justify-content: center; gap: 5px; }
        .manual-btns button { 
            padding: 2px 8px; font-size: 1rem; border: 2px solid var(--dark); 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* --- GRID --- */
        #word-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            width: 95%; max-width: 900px; padding: 15px;
        }
        .word-card {
            background: white; border: 4px solid var(--dark); border-radius: 15px;
            aspect-ratio: 1; font-size: 2.5rem; display: flex; align-items: center;
            justify-content: center; font-weight: 700; cursor: pointer; box-shadow: 0 6px 0 var(--dark);
        }

        /* --- QUESTION MODAL --- */
        #question-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .q-text { font-size: 2.6rem; margin-bottom: 25px; text-align: center; padding: 0 20px; }
        .drop-target {
            width: 280px; height: 80px; border: 4px dashed var(--primary);
            margin: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
        }
        .options-row { display: flex; gap: 20px; margin-bottom: 40px; }
        .opt-card {
            padding: 20px 35px; background: white; color: var(--dark); border-radius: 15px;
            font-weight: 700; font-size: 2rem; cursor: pointer;
        }

        /* --- RESULT PAGE --- */
        #result-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4000; flex-direction: column; justify-content: center; align-items: center; background-size: cover; background-position: center;
        }
        #result-text { font-size: 5.5rem; color: white; text-shadow: 5px 5px 0 #000; text-align: center; }

        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; color:white; padding:20px; text-align:center; }
        input { padding: 12px; margin: 8px; font-size: 1.2rem; border-radius: 8px; width: 40%; font-family: 'Balsamiq Sans', cursive; }

        @keyframes shake { 0%, 100% {transform: translate(0,0);} 25% {transform: translate(-10px,10px);} 50% {transform: translate(10px,-10px);} 75% {transform: translate(-10px,-10px);} }
        .shake { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <button class="btn-ui btn-start" onclick="initAudio(); startGame();">START GAME</button>
        <button class="btn-ui" onclick="showOverlay('groups')">SET TEAMS</button>
    </div>

    <div id="game-page" class="page">
        <div class="game-header">
            <div class="scoreboard" id="scoreboard"></div>
        </div>
        <div id="word-grid"></div>
    </div>

    <div id="question-overlay">
        <div class="q-text" id="q-prompt">Is this a ____?</div>
        <div class="drop-target" id="drop-zone">????</div>
        <div class="options-row" id="options-row"></div>
        <div style="display: flex; gap: 30px;">
            <button class="btn-ui" style="background: var(--success); min-width: 150px; font-size: 2rem;" onclick="checkAnswer()">CHECK ✔</button>
            <button class="btn-ui" style="background: var(--danger); min-width: 150px; font-size: 2rem;" onclick="failAnswer()">X</button>
        </div>
    </div>

    <div id="result-page">
        <h1 id="result-text"></h1>
        <button class="btn-ui" onclick="closeResult()">NEXT PLAYER >></button>
    </div>

    <div id="groups" class="overlay">
        <h2>Enter Team Names (Max 4)</h2>
        <div id="team-inputs">
            <input type="text" class="t-name" value="Team 1">
            <input type="text" class="t-name" value="Team 2">
            <input type="text" class="t-name" placeholder="Team 3">
            <input type="text" class="t-name" placeholder="Team 4">
        </div>
        <br><button class="btn-ui" onclick="setupTeams()">SAVE</button>
    </div>

    <script>
        let teamData = [];
        let currentTeamIdx = 0;
        let selectedOption = null;
        let currentCardElement = null;
        let audioCtx;
        let musicNode;

        const questions = [
            { q: "It is a ____ dog.", opt: ["big", "can", "swim"], a: "big" },
            { q: "I can ____.", opt: ["sing", "bird", "fish"], a: "sing" },
            { q: "Is that a ____?", opt: ["cat", "jump", "dance"], a: "cat" },
            { q: "Can you ____?", opt: ["jump", "small", "is"], a: "jump" },
            { q: "What ____ you do?", opt: ["can", "it", "no"], a: "can" },
            { q: "It is a ____ fish.", opt: ["small", "write", "yes"], a: "small" },
            { q: "No, I ____.", opt: ["can't", "is", "am"], a: "can't" },
            { q: "Yes, I ____.", opt: ["can", "not", "no"], a: "can" },
            { q: "A ____ cat.", opt: ["small", "can", "swim"], a: "small" },
            { q: "I can ____.", opt: ["draw", "is", "bird"], a: "draw" },
            { q: "____ you jump?", opt: ["Can", "Is", "Am"], a: "Can" },
            { q: "I can ____.", opt: ["swim", "dog", "no"], a: "swim" }
        ];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Background Music Generator (Oscillator for a simple bleep-bloop melody)
            const playTone = (freq, time, length) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0.05, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + length);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + length);
            };

            const loopMusic = () => {
                const now = audioCtx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                for(let i=0; i<8; i++) {
                    playTone(notes[i % 4], now + (i * 0.5), 0.4);
                }
                setTimeout(loopMusic, 4000);
            };
            loopMusic();
        }

        function showOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function hideOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        function setupTeams() {
            teamData = [];
            document.querySelectorAll('.t-name').forEach((input, i) => {
                if (input.value.trim() !== "") teamData.push({ name: input.value.trim(), score: 0 });
            });
            if(teamData.length === 0) teamData = [{name: "Team 1", score: 0}, {name: "Team 2", score: 0}];
            hideOverlays();
        }
        setupTeams();

        function modifyScore(idx, delta) {
            teamData[idx].score += delta;
            document.getElementById(`score-${idx}`).innerText = teamData[idx].score;
        }

        function startGame() {
            currentTeamIdx = 0;
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            teamData.forEach((t, i) => {
                sb.innerHTML += `
                <div class="team-box" id="team-${i}">
                    <span style="font-size:0.8rem">${t.name}</span>
                    <span class="score-val" id="score-${i}">0</span>
                    <div class="manual-btns">
                        <button onclick="modifyScore(${i}, 1)" style="background:#e8f5e9">+1</button>
                        <button onclick="modifyScore(${i}, -1)" style="background:#ffebee">-1</button>
                    </div>
                </div>`;
            });
            updateTurnVisuals();

            const grid = document.getElementById('word-grid');
            grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = i;
                card.onclick = () => openQuestion(i, card);
                grid.appendChild(card);
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('game-page').classList.add('active');
        }

        function updateTurnVisuals() {
            document.querySelectorAll('.team-box').forEach((box, i) => {
                box.classList.toggle('active-turn', i === currentTeamIdx);
            });
        }

        function openQuestion(num, element) {
            currentCardElement = element;
            selectedOption = null;
            const q = questions[num-1];
            document.getElementById('q-prompt').innerText = q.q;
            document.getElementById('drop-zone').innerText = "????";
            
            const optRow = document.getElementById('options-row');
            optRow.innerHTML = '';
            q.opt.sort(() => Math.random() - 0.5).forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'opt-card';
                btn.innerText = o;
                btn.onclick = () => {
                    selectedOption = o;
                    document.getElementById('drop-zone').innerText = o;
                };
                optRow.appendChild(btn);
            });
            document.getElementById('question-overlay').style.display = 'flex';
        }

        function checkAnswer() {
            if(!selectedOption) return;
            const qIdx = parseInt(currentCardElement.innerText) - 1;
            if(selectedOption === questions[qIdx].a) {
                const reward = Math.floor(Math.random() * 3) + 1;
                showResult("CORRECT! 💰 +" + reward, "result_page_yes.png", reward);
            } else {
                failAnswer();
            }
        }

        function failAnswer() {
            showResult("💣 BOMB! -2", "result_page_no.png", -2, true);
        }

        function showResult(text, bg, pts, isBomb = false) {
            document.getElementById('question-overlay').style.display = 'none';
            const resPage = document.getElementById('result-page');
            const resText = document.getElementById('result-text');
            resPage.style.backgroundImage = `url('${bg}')`;
            resText.innerText = text;
            resPage.classList.toggle('shake', isBomb);
            
            modifyScore(currentTeamIdx, pts);
            resPage.style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-page').style.display = 'none';
            currentCardElement.style.visibility = 'hidden';
            currentTeamIdx = (currentTeamIdx + 1) % teamData.length;
            updateTurnVisuals();
        }
    </script>
</body>
</html>
